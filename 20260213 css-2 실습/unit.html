<!DOCTYPE html>
<html>
<head>
<style>

body {
  font-size: 16px; /* 기본 글자 크기 */
}

.container {
  border: 3px solid black;
  margin: 20px;
  padding: 20px;
}

/* 1️⃣ px */
.px-box {
  width: 200px;
  padding: 20px;
  margin: 20px;
  background-color: lightblue;
}

/* 2️⃣ % */
.percent-box {
  width: 50%;
  padding: 5%;
  background-color: lightcoral;
}

/* 3️⃣ em */
.em-box {
  font-size: 20px;
  padding: 2em;
  background-color: lightgreen;
}

/* 4️⃣ rem */
.rem-box {
  padding: 2rem;
  background-color: orange;
}

/* 5️⃣ vw */
.vw-box {
  width: 50vw;
  background-color: violet;
}

</style>
</head>
<body>

<div class="container">

  <div class="px-box">px 박스</div>
  <div class="percent-box">percent 박스</div>
  <div class="em-box">em 박스</div>
  <div class="rem-box">rem 박스</div>
  <div class="vw-box">vw 박스</div>

</div>

</body>
</html>
