<!DOCTYPE html>
<html>
<head>
<style>
  p {
    color: blue; /* 태그 선택자 */
  }

  .highlight {
    color: red; /* 클래스 선택자 */
  }

  #unique {
    color: green; /* ID 선택자 */
  }

  p.inline-style {
    color: yellow !important; /* !important */
  }
</style>
</head>
<body>

<p id="unique" class="inline-style highlight">
  CSS 우선순위 예시입니다!
</p>

</body>
</html>
